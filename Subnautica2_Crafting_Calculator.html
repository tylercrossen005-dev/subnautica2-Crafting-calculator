<html lang="en">

<meta charset="UTF-8">

<title>Subnautica 2 — Crafting Calculator</title>
<style>
  :root {
    --bg: #07111f;
    --panel: #0d1f33;
    --card: #122840;
    --border: #1e4060;
    --accent: #00c8e0;
    --accent2: #0090a8;
    --text: #c8e8f0;
    --muted: #5a8099;
    --raw: #88bbcc;
    --crafted: #60d0b0;
    --qty: #ffc060;
    --minus: #e05050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    background: linear-gradient(135deg, #061828 0%, #0a2540 100%);
    border-bottom: 2px solid var(--accent2);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.25rem; color: var(--accent); letter-spacing: 1px; font-weight: 600; }
  header p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
  .toggle { position: relative; width: 40px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: .2s; }
  .slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: var(--muted); border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--accent2); }
  input:checked + .slider:before { transform: translateX(20px); background: var(--accent); }

  /* ── DESKTOP LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 62px); }
  .tab-bar { display: none; }

  /* LEFT PANEL */
  .left { width: 380px; min-width: 320px; display: flex; flex-direction: column; border-right: 2px solid var(--border); background: var(--panel); }
  .search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .search-wrap input {
    width: 100%; padding: 7px 12px; border-radius: 6px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 0.82rem; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap input::placeholder { color: var(--muted); }
  .clear-btn {
    margin-top: 6px; width: 100%; padding: 5px; border-radius: 5px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; cursor: pointer; transition: .15s;
  }
  .clear-btn:hover { border-color: var(--minus); color: var(--minus); }

  .item-list { overflow-y: auto; flex: 1; padding-bottom: 12px; }
  .category { border-bottom: 1px solid var(--border); }
  .cat-header {
    padding: 8px 12px; font-size: 0.73rem; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent2);
    background: #0a1a2e; cursor: pointer; user-select: none;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 2;
  }
  .cat-header .arrow { transition: transform .2s; font-size: 0.6rem; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }
  .cat-body { }
  .cat-body.hidden { display: none; }

  .item-row {
    display: flex; align-items: center; padding: 5px 10px 5px 14px;
    border-bottom: 1px solid #0d1f33; transition: background .1s;
  }
  .item-row:hover { background: #0f2035; }
  .item-row.active { background: #0e2a3a; }
  .item-name { flex: 1; font-size: 0.82rem; color: var(--text); padding-right: 8px; }
  .qty-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .qty-ctrl button {
    width: 22px; height: 22px; border-radius: 4px; border: none;
    font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: .15s;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }
  .btn-minus { background: #1a1a2e; color: var(--minus); }
  .btn-minus:hover { background: var(--minus); color: #fff; }
  .btn-plus  { background: #0e2a1e; color: var(--crafted); }
  .btn-plus:hover  { background: var(--crafted); color: #000; }
  .qty-input {
    width: 32px; text-align: center; background: var(--card);
    border: 1px solid var(--border); color: var(--qty);
    font-size: 0.82rem; font-weight: bold; border-radius: 3px;
    padding: 1px 2px;
  }
  .qty-input:focus { outline: none; border-color: var(--accent2); }

  /* RIGHT PANEL */
  .right { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  .right-header {
    padding: 12px 20px 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; background: var(--panel);
  }
  .right-header h2 { font-size: 0.9rem; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; }
  .badge { background: var(--accent2); color: #000; font-size: 0.7rem; font-weight: 700; padding: 1px 7px; border-radius: 10px; }
  .copy-btn {
    margin-left: auto; padding: 5px 14px; border-radius: 5px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; cursor: pointer; transition: .15s;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent); }

  .ingredient-list { overflow-y: auto; flex: 1; padding: 14px 20px; display: flex; flex-direction: column; gap: 6px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); font-size: 0.85rem; gap: 8px;
  }
  .empty-state .icon { font-size: 2.5rem; opacity: .4; }

  .ing-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; border-radius: 6px;
    background: var(--card); border: 1px solid var(--border);
    transition: background .1s;
  }
  .ing-row:hover { background: #162f47; }
  .ing-qty { font-size: 1rem; font-weight: 700; color: var(--qty); min-width: 36px; text-align: right; }
  .ing-name { font-size: 0.84rem; color: var(--text); flex: 1; }
  .ing-tag {
    font-size: 0.66rem; padding: 1px 6px; border-radius: 8px;
    font-weight: 600; letter-spacing: .5px;
  }
  .tag-raw     { background: #1a3040; color: var(--raw); border: 1px solid #1e4060; }
  .tag-crafted { background: #0d2820; color: var(--crafted); border: 1px solid #1a5040; }

  .section-label {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); padding: 8px 4px 2px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── MOBILE LAYOUT ── */
  @media (max-width: 700px) {
    header {
      flex-wrap: wrap; padding: 10px 14px; gap: 8px;
    }
    header h1 { font-size: 1rem; }
    header p  { font-size: 0.72rem; }
    .header-right { margin-left: 0; width: 100%; }
    .toggle-wrap  { font-size: 0.75rem; gap: 6px; }

    /* Tab bar replaces side-by-side layout */
    .tab-bar {
      display: flex; background: var(--panel);
      border-bottom: 2px solid var(--border); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 11px 8px; border: none; background: transparent;
      color: var(--muted); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .main {
      flex-direction: column; height: auto;
      overflow: visible; flex: 1;
    }
    .left {
      width: 100%; min-width: unset; border-right: none;
      display: none; flex: 1;
    }
    .left.tab-active  { display: flex; }
    .right {
      display: none; flex: 1;
    }
    .right.tab-active { display: flex; }

    /* Taller touch targets */
    .qty-ctrl button  { width: 38px; height: 38px; font-size: 1.1rem; border-radius: 6px; }
    .qty-input        { width: 40px; height: 38px; font-size: 0.9rem; }
    .item-row         { padding: 9px 10px 9px 14px; }
    .item-name        { font-size: 0.86rem; }
    .clear-btn        { padding: 9px; font-size: 0.8rem; }
    .search-wrap input { padding: 10px 12px; font-size: 0.86rem; }

    .ingredient-list  { padding: 10px 12px; }
    .ing-row          { padding: 10px 12px; }
    .ing-qty          { font-size: 1.05rem; }
    .ing-name         { font-size: 0.88rem; }
    .copy-btn         { padding: 7px 14px; font-size: 0.8rem; }

    /* Let item list scroll naturally on mobile */
    .item-list        { overflow-y: auto; max-height: calc(100dvh - 180px); }
    .ingredient-list  { min-height: calc(100dvh - 180px); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚙ Subnautica 2 — Crafting Calculator</h1>
    <p>Select items and quantities to see aggregated ingredient totals</p>
  </div>
  <div class="header-right">
    <div class="toggle-wrap">
      <span>Direct ingredients</span>
      <label class="toggle">
        <input type="checkbox" id="expandToggle" onchange="render()">
        <span class="slider"></span>
      </label>
      <span>Raw materials</span>
    </div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tabItems" onclick="switchTab('items')">⚗ Select Items</button>
  <button class="tab-btn" id="tabIng" onclick="switchTab('ingredients')">📋 Ingredients <span class="badge" id="ingCountTab">0</span></button>
</div>

<div class="main">
  <div class="left tab-active">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search items…" oninput="filterItems()">
      <button class="clear-btn" onclick="clearAll()">✕ Clear all selections</button>
    </div>
    <div class="item-list" id="itemList"></div>
  </div>
  <div class="right">
    <div class="right-header">
      <h2>Ingredients Needed</h2>
      <span class="badge" id="ingCount">0</span>
      <button class="copy-btn" onclick="copyList()">Copy list</button>
    </div>
    <div class="ingredient-list" id="ingList">
      <div class="empty-state">
        <div class="icon">🔬</div>
        <div>Select items on the left to calculate ingredients</div>
      </div>
    </div>
  </div>
</div>

// Items that can be broken down further (for "raw materials" mode)

  "Copper Wire":         {"Copper":2},
  "Power Cell":          {"Copper":4,"Acidic Raion Pouch":2,"Necrolei Cyst":2,"Salt":1},
  "Entangled Power Cell":{"Conduit Crystal":1,"Necrolei Cyst":2,"Gold":3,"Troilite":1},

  "System Chip":         {"Silver":1,"Copper":2,"Quartz":2},
  "Dedicated Core":      {"Silver":1,"Copper":2,"Gold":1,"Sulfur":1,"Quartz":2,"Necrolei Cyst":2},

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const qty = {}; // item name → quantity

function getQty(name) { return qty[name] || 0; }

function setQty(name, val) {
  const v = Math.max(0, Math.min(999, parseInt(val) || 0));
  qty[name] = v;
  render();
  return v;
}

// ─────────────────────────────────────────────
// INGREDIENT CALCULATION
// ─────────────────────────────────────────────
function addIngredients(recipe, multiplier, result) {
  for (const [ing, amt] of Object.entries(recipe)) {
    result[ing] = (result[ing] || 0) + amt * multiplier;
  }
}

function calcDirect() {
  const result = {};
  for (const cat of CATEGORIES) {
    for (const item of cat.items) {
      const q = getQty(item.name);
      if (q > 0) addIngredients(item.r, q, result);
    }
  }
  return result;
}

function expandRaw(ing, amt, result) {
  if (CRAFTABLE[ing]) {
    for (const [sub, subAmt] of Object.entries(CRAFTABLE[ing])) {
      expandRaw(sub, subAmt * amt, result);
    }
  } else {
    result[ing] = (result[ing] || 0) + amt;
  }
}

function calcRaw() {
  const direct = calcDirect();
  const result = {};
  for (const [ing, amt] of Object.entries(direct)) {
    expandRaw(ing, amt, result);
  }
  return result;
}

// ─────────────────────────────────────────────
// KNOWN RAW MATERIALS (for tagging)
// ─────────────────────────────────────────────
const RAW_MATS = new Set([
  "Titanium","Copper","Silver","Gold","Quartz","Salt","Lead","Lithium","Sulfur",
  "Acidic Raion Pouch","Lucifer Rotsac","Fibrous Pulp","Necrolei Cyst",
  "Conduit Crystal","Troilite","Atacamite","Celestine","Metal Salvage",
  "Halfmoon","Harvestmoon","Bluemoon","Hoverthorn","Black Hoverthorn",
  "Quadrate","Geordie","Electric Geordie","Pneuma","Flash Slug","Water Slug",
  "Deepwing Egg Clump","Cherimoya Rotsac","Coral Shavings","Medical Gel Sac",
  "Crab Feces","Pent","Axum Bacterial Culture","Creature Enamel",
]);

// ─────────────────────────────────────────────
// RENDER LEFT PANEL
// ─────────────────────────────────────────────
function buildItemList() {
  const el = document.getElementById('itemList');
  el.innerHTML = '';
  const search = document.getElementById('search').value.toLowerCase().trim();

  for (const cat of CATEGORIES) {
    const filtered = cat.items.filter(i => i.name.toLowerCase().includes(search));
    if (filtered.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'category';

    const header = document.createElement('div');
    header.className = 'cat-header';
    const countActive = filtered.filter(i => getQty(i.name) > 0).length;
    header.innerHTML = `<span>${cat.name}</span><span style="display:flex;gap:6px;align-items:center">${countActive > 0 ? `<span style="background:#1a4060;color:var(--accent);font-size:.65rem;padding:1px 6px;border-radius:8px">${countActive}</span>` : ''}<span class="arrow">▼</span></span>`;
    header.onclick = () => {
      header.classList.toggle('collapsed');
      body.classList.toggle('hidden');
    };
    section.appendChild(header);

    const body = document.createElement('div');
    body.className = 'cat-body';
    section.appendChild(body);

    for (const item of filtered) {
      const q = getQty(item.name);
      const row = document.createElement('div');
      row.className = 'item-row' + (q > 0 ? ' active' : '');
      row.innerHTML = `
        <span class="item-name">${item.name}</span>
        <div class="qty-ctrl">
          <button class="btn-minus" onclick="adjustQty('${item.name.replace(/'/g,"\\'")}', -1)">−</button>
          <input class="qty-input" type="number" min="0" max="999" value="${q}"
            onchange="handleInput(this,'${item.name.replace(/'/g,"\\'")}')">
          <button class="btn-plus" onclick="adjustQty('${item.name.replace(/'/g,"\\'")}', 1)">+</button>
        </div>`;
      body.appendChild(row);
    }
    el.appendChild(section);
  }
}

function adjustQty(name, delta) {
  setQty(name, getQty(name) + delta);
  buildItemList();
}

function handleInput(input, name) {
  const v = setQty(name, input.value);
  input.value = v;
  buildItemList();
}

function filterItems() { buildItemList(); }

function clearAll() {
  for (const k of Object.keys(qty)) qty[k] = 0;
  buildItemList();
  render();
}

// ─────────────────────────────────────────────
// RENDER RIGHT PANEL
// ─────────────────────────────────────────────
function render() {
  const expand = document.getElementById('expandToggle').checked;
  const result = expand ? calcRaw() : calcDirect();
  const list = document.getElementById('ingList');
  const badge = document.getElementById('ingCount');

  const entries = Object.entries(result).filter(([,v]) => v > 0);

  if (entries.length === 0) {
    badge.textContent = '0';
    const tabBadge0 = document.getElementById('ingCountTab');
    if (tabBadge0) tabBadge0.textContent = '0';
    list.innerHTML = `<div class="empty-state"><div class="icon">🔬</div><div>Select items on the left to calculate ingredients</div></div>`;
    return;
  }

  // Sort: raw first, then crafted; within each group alphabetical
  entries.sort((a, b) => {
    const aRaw = RAW_MATS.has(a[0]) || expand;
    const bRaw = RAW_MATS.has(b[0]) || expand;
    if (aRaw !== bRaw) return bRaw ? 1 : -1;
    return a[0].localeCompare(b[0]);
  });

  badge.textContent = entries.length;
  const tabBadge = document.getElementById('ingCountTab');
  if (tabBadge) tabBadge.textContent = entries.length;
  list.innerHTML = '';

  const rawEntries    = entries.filter(([k]) => expand || RAW_MATS.has(k));
  const craftedEntries= entries.filter(([k]) => !expand && !RAW_MATS.has(k));

  if (craftedEntries.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = 'Crafted Ingredients';
    list.appendChild(lbl);
    for (const [name, amt] of craftedEntries) appendRow(list, name, amt, false);
  }

  if (rawEntries.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = expand ? 'Raw Materials' : 'Raw Materials';
    list.appendChild(lbl);
    for (const [name, amt] of rawEntries) appendRow(list, name, amt, true);
  }

  buildItemList(); // refresh active counts in headers
}

function appendRow(list, name, amt, isRaw) {
  const row = document.createElement('div');
  row.className = 'ing-row';
  const tag = isRaw
    ? `<span class="ing-tag tag-raw">RAW</span>`
    : `<span class="ing-tag tag-crafted">CRAFTED</span>`;
  row.innerHTML = `<span class="ing-qty">${amt}×</span><span class="ing-name">${name}</span>${tag}`;
  list.appendChild(row);
}

function copyList() {
  const expand = document.getElementById('expandToggle').checked;
  const result = expand ? calcRaw() : calcDirect();
  const lines = Object.entries(result)
    .filter(([,v]) => v > 0)
    .sort((a,b) => a[0].localeCompare(b[0]))
    .map(([k,v]) => `${v}x ${k}`)
    .join('\n');
  if (!lines) return;
  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy list', 1500);
  });
}

// ─────────────────────────────────────────────
// TAB SWITCHING (mobile)
// ─────────────────────────────────────────────
function switchTab(tab) {
  const left  = document.querySelector('.left');
  const right = document.querySelector('.right');
  const tItems = document.getElementById('tabItems');
  const tIng   = document.getElementById('tabIng');
  if (tab === 'items') {
    left.classList.add('tab-active');
    right.classList.remove('tab-active');
    tItems.classList.add('active');
    tIng.classList.remove('active');
  } else {
    right.classList.add('tab-active');
    left.classList.remove('tab-active');
    tIng.classList.add('active');
    tItems.classList.remove('active');
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildItemList();
render();
</script>
